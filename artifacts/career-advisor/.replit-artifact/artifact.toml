kind = "web"
previewPath = "/"
title = "AI Career Advisor"
version = "1.0.0"
id = "artifacts/career-advisor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20663

[services.development]
run = "pnpm --filter @workspace/career-advisor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-advisor", "run", "build" ]
publicDir = "artifacts/career-advisor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20663"
BASE_PATH = "/"
